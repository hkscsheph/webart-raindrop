<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Rain Shield: Ultra-Efficient</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            box-sizing: border-box;
            padding: 10px;
        }
        #controls {
            margin-bottom: 15px;
            z-index: 10;
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 800px;
            justify-content: center;
        }
        button {
            padding: 12px 20px;
            font-size: 14px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            flex: 1;
            max-width: 200px;
        }
        .webcam-btn { background-color: #007bff; }
        .webcam-btn:hover { background-color: #0056b3; }
        .tab-btn { background-color: #28a745; }
        .tab-btn:hover { background-color: #218838; }
        
        #container {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9; 
            background: #000;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 8px;
            object-fit: contain; 
        }
        video {
            display: none;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            color: #fff;
            background: rgba(0,0,0,0.85);
            padding: 15px 20px;
            border-radius: 5px;
            pointer-events: none;
            display: none;
            text-align: center;
            border: 1px solid #444;
            z-index: 20;
            width: 80%;
            max-width: 300px;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.20.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-segmentation@1.0.2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.20.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.20.0"></script>
</head>
<body>

    <div id="controls">
        <button id="webcamBtn" class="webcam-btn">Webcam</button>
        <button id="tabBtn" class="tab-btn">Tab Share</button>
    </div>

    <div id="container">
        <div id="loading">Loading AI Model Engine...</div>
        <video id="srcVideo" autoplay playsinline muted></video>
        <canvas id="outputCanvas"></canvas>
    </div>

    <script>
        const video = document.getElementById('srcVideo');
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d');
        const webcamBtn = document.getElementById('webcamBtn');
        const tabBtn = document.getElementById('tabBtn');
        const controlsDiv = document.getElementById('controls');
        const loadingDiv = document.getElementById('loading');

        let segmenter = null;
        let raindrops = [];
        let activeStream = null;
        const maxRaindrops = 250; // Performance is optimized enough to handle more raindrops seamlessly

        // Optimization Storage Arrays
        let currentMaskData = null; 
        let lastAITime = 0;
        const aiInterval = 1000 / 30; // Throttle AI segmentation to max 30 FPS

        // --- 1. Load the AI Segmentation Model ---
        async function loadModel() {
            loadingDiv.style.display = 'block';
            try {
                if (typeof tf !== 'undefined') {
                    await tf.setBackend('webgl');
                    await tf.ready();
                } else {
                    throw new Error("TensorFlow script load blocked.");
                }

                const model = bodySegmentation.SupportedModels.MediaPipeSelfieSegmentation;
                const segmenterConfig = {
                    runtime: 'mediapipe',
                    solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation',
                    modelType: 'landscape' // Drastically faster model architecture
                };
                segmenter = await bodySegmentation.createSegmenter(model, segmenterConfig);
                loadingDiv.style.display = 'none';
            } catch (err) {
                loadingDiv.innerHTML = `<span style="color: #ff6b6b; font-weight: bold;">Model Load Failed</span><br><small style="font-size:12px; color:#aaa;">Disable tracker blockers and refresh.</small>`;
                console.error(err);
            }
        }

        // --- 2. Stream Pipeline Setup ---
        async function startProcessingStream(stream) {
            activeStream = stream;
            video.srcObject = stream;
            controlsDiv.style.display = 'none'; 
            
            if (!segmenter) {
                await loadModel();
            }
            
            await video.play();
            await new Promise(resolve => setTimeout(resolve, 250)); 
            
            const track = stream.getVideoTracks()[0];
            const settings = track.getSettings();
            
            const streamWidth = settings.width || video.videoWidth || 800;
            const streamHeight = settings.height || video.videoHeight || 450;
            
            canvas.width = streamWidth;
            canvas.height = streamHeight;
            
            document.getElementById('container').style.aspectRatio = `${streamWidth} / ${streamHeight}`;
            
            initRain();
            requestAnimationFrame(animate);
        }

        webcamBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" },
                    audio: false
                });
                await startProcessingStream(stream);
            } catch (err) {
                console.error(err);
                alert("Webcam permission denied or unavailable.");
            }
        });

        tabBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: true, 
                    audio: false
                });
                await startProcessingStream(stream);
            } catch (err) {
                console.error(err);
                alert("Tab capture selection cancelled.");
            }
        });

        // --- 3. Physics Particle Engine ---
        function initRain() {
            raindrops = [];
            for (let i = 0; i < maxRaindrops; i++) {
                raindrops.push(resetDrop({}));
            }
        }

        function resetDrop(drop) {
            drop.x = Math.random() * canvas.width;
            drop.y = Math.random() * -50;
            drop.length = Math.random() * 15 + 10;
            drop.vy = Math.random() * 10 + 10; 
            drop.vx = (Math.random() - 0.5) * 1; 
            drop.weight = Math.random() * 2 + 1;
            drop.isDeflected = false; 
            drop.life = 1.0; 
            return drop;
        }

        // ULTRA EFFICIENT MEMORY LOOKUP (Replaces CPU-melting getImageData)
        function isPixelHumanFast(x, y, width, height) {
            if (x < 0 || x >= width || y < 0 || y >= height || !currentMaskData) return false;
            // Map 2D spatial coordinates into the flat 1D alpha-channel array index
            const index = (Math.floor(y) * width + Math.floor(x)) * 4;
            return currentMaskData[index + 3] > 0; 
        }

        // --- 4. Main Performance Graphics Loop ---
        async function animate(timestamp) {
            if (video.paused || video.ended) return;

            // Render camera frame background
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Optimization: Only compute the AI mask 30 times a second max
            if (segmenter && timestamp - lastAITime >= aiInterval) {
                try {
                    const segmentation = await segmenter.segmentPeople(video);
                    const foregroundColor = {r: 255, g: 255, b: 255, a: 255};
                    const backgroundColor = {r: 0, g: 0, b: 0, a: 0};
                    const mask = await bodySegmentation.toBinaryMask(segmentation, foregroundColor, backgroundColor);
                    
                    // Directly bind the raw Uint8Array for instant lookups
                    currentMaskData = mask.data;
                    lastAITime = timestamp;
                } catch (e) {
                    console.error("AI execution fallback:", e);
                }
            }

            ctx.lineCap = 'round';
            const w = canvas.width;
            const h = canvas.height;

            // Process particles at full 60FPS using the fast memory map
            for (let i = 0; i < raindrops.length; i++) {
                let drop = raindrops[i];
                let nextX = drop.x + drop.vx;
                let nextY = drop.y + drop.vy;

                if (currentMaskData) {
                    const hitDetected = isPixelHumanFast(nextX, nextY, w, h);

                    if (hitDetected && !drop.isDeflected) {
                        drop.isDeflected = true;
                        
                        // Rapid proximity testing via memory offset increments
                        let lookLeft = 0;
                        let lookRight = 0;
                        
                        for (let offset = 1; offset < 35; offset++) {
                            if (!isPixelHumanFast(nextX - offset, nextY, w, h)) { lookLeft = offset; break; }
                        }
                        for (let offset = 1; offset < 35; offset++) {
                            if (!isPixelHumanFast(nextX + offset, nextY, w, h)) { lookRight = offset; break; }
                        }

                        if (lookLeft > 0 && (lookLeft < lookRight || lookRight === 0)) {
                            drop.vx = -Math.random() * 8 - 4; 
                        } else if (lookRight > 0) {
                            drop.vx = Math.random() * 8 + 4;  
                        } else {
                            drop.vx = (Math.random() - 0.5) * 12; 
                        }

                        drop.vy = -Math.random() * 4 - 2; 
                        drop.length = 4; 
                    }
                }

                if (drop.isDeflected) {
                    drop.vy += 0.8; 
                    drop.life -= 0.04; 
                    ctx.strokeStyle = `rgba(160, 220, 255, ${drop.life})`;
                } else {
                    ctx.strokeStyle = 'rgba(174, 219, 255, 0.6)';
                }

                drop.x = nextX;
                drop.y = nextY;
                ctx.lineWidth = drop.weight;

                ctx.beginPath();
                ctx.moveTo(drop.x, drop.y);
                ctx.lineTo(drop.x + (drop.vx * 0.5), drop.y + drop.length);
                ctx.stroke();

                if (drop.y > h || drop.x < 0 || drop.x > w || (drop.isDeflected && drop.life <= 0)) {
                    resetDrop(drop);
                }
            }

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
